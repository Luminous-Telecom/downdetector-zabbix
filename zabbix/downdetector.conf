# UserParameter do Downdetector BR
#
# Template geral no Zabbix + lista de serviços NESTE host:
#   /opt/downdetector-zabbix/services.txt
#
# 1) docker compose up -d
# 2) cp services.txt.example services.txt  e edite os slugs
# 3) cp este conf → /etc/zabbix/zabbix_agentd.d/  + Timeout=30
# 4) Importe zabbix/template_downdetector_br.yaml e vincule ao host

# LLD: só lê o arquivo local (instantâneo) — o host decide o que monitorar
UserParameter=downdetector.discovery,/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --lld

# Item mestre: coleta um serviço (FlareSolverr, ~5–20s)
UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat
