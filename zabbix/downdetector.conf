# Este arquivo pressupõe que os arquivos do projeto estão em
# /opt/downdetector-zabbix. Se estiverem em outro caminho (ex.:
# ~/downdetector-zabbix), ajuste os dois "UserParameter" abaixo antes de
# copiar.
#
# Copie este arquivo para /etc/zabbix/zabbix_agent2.d/downdetector.conf
# (ou para /etc/zabbix/zabbix_agentd.d/ se estiver usando o agente clássico)
# e reinicie o serviço do agente.
#
#   cp /opt/downdetector-zabbix/zabbix/downdetector.conf /etc/zabbix/zabbix_agent2.d/downdetector.conf
#   systemctl restart zabbix-agent2

# Descoberta (LLD): lista todos os serviços da home (rápido, sem relatos).
UserParameter=downdetector.discovery,/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --lld

# Item mestre: dados completos de UM serviço (logo, nome, status, relatos).
# $1 = slug do serviço, ex.: whatsapp, nubank, steam.
UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat
