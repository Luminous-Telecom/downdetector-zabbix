# UserParameter do Downdetector BR
#
# 1) Arquivos em /opt/downdetector-zabbix
# 2) docker compose up -d   (FlareSolverr)
# 3) cp este arquivo para /etc/zabbix/zabbix_agentd.d/downdetector.conf
# 4) Timeout=30 no agent + systemctl restart zabbix-agent
#
# No Zabbix, crie UM item por serviço que quiser (sem discovery):
#   Key: downdetector.status[whatsapp]
#   Type: Zabbix agent  |  Info: Text  |  Interval: 15m  |  Timeout: 30s
#
# Opcional: itens dependentes com JSONPath $.status_code, $.reports, etc.

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat
