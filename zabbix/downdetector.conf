# Zabbix Agent — resposta em milissegundos (só lê cache).
# Host name técnico = slug (whatsapp, caixa, banco-inter).
# Template key: downdetector.status[{HOST.HOST}]
#
# Cache: chown -R zabbix:zabbix /var/cache/downdetector-zabbix
# Timeout=30 no zabbix_agentd.conf (máximo do agent clássico)

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --from-cache --service $1
