# UserParameter — coletor (FlareSolverr + este script).
#
# No Zabbix: cada host = um serviço. Host name técnico = slug
# (whatsapp, instagram). Template usa downdetector.status[{HOST.HOST}].
# Interface Agent de todos = IP deste coletor. Timeout=30.

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat
