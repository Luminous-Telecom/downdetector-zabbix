# UserParameter — coletor (FlareSolverr + este script).
#
# zabbix_agentd clássico: Timeout máximo = 30 (não use 60).
# Cache por slug (5 min). Diretório deve ser gravável pelo user zabbix:
#   mkdir -p /var/cache/downdetector-zabbix
#   chown -R zabbix:zabbix /var/cache/downdetector-zabbix
#
# Host name técnico = slug. Template: downdetector.status[{HOST.HOST}]

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat --cache-ttl 300
