# Instalação recomendada para Zabbix Agent (clássico ou agent2):
#
#   1) Clone/copie o projeto em /opt/downdetector-zabbix
#   2) Suba o FlareSolverr (docker compose up -d)
#   3) Instale o timer de cache:
#        cp systemd/* /etc/systemd/system/
#        mkdir -p /var/cache/downdetector-zabbix
#        systemctl daemon-reload
#        systemctl enable --now downdetector-cache.timer
#        systemctl start downdetector-cache.service   # primeira coleta
#   4) Copie este conf e reinicie o agent:
#        cp zabbix/downdetector.conf /etc/zabbix/zabbix_agentd.d/downdetector.conf
#        systemctl restart zabbix-agent
#
# O UserParameter NÃO chama o Cloudflare. Ele só lê o cache local
# atualizado pelo systemd timer a cada 15 minutos.

# Descoberta (LLD) — leitura instantânea do cache
UserParameter=downdetector.discovery,/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --from-cache --lld

# Item mestre — JSON plano de um serviço (logo, nome, status, relatos)
# $1 = slug, ex.: whatsapp
UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --from-cache --service $1 --flat
