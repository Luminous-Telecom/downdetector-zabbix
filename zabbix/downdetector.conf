# UserParameter — roda no servidor onde está o FlareSolverr (coletor).
#
# No Zabbix: cada *host* = um serviço (WhatsApp, Instagram, …).
# Template usa macro {$DOWNDETECTOR.SLUG} = whatsapp | Instagram → instagram
# Interface Agent de todos esses hosts = IP deste coletor.
#
# Timeout=30 no agent + Import template_downdetector_br.yaml

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat
