# UserParameter — coletor (FlareSolverr + este script).
#
# zabbix_agentd clássico: Timeout máximo = 30 (não use 60).
# Cache por slug (~15 min) para o agent não estourar o timeout.
#
# Host name técnico = slug. Template: downdetector.status[{HOST.HOST}]
# Interface Agent = IP deste coletor.

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat --cache-ttl 900
