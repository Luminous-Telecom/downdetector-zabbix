# UserParameter — Zabbix Agent SÓ LÊ o cache (ms).
# Quem atualiza: timer downdetector-refresh (hosts vindos da API Zabbix).
#
# Host name técnico = slug. Template: downdetector.status[{HOST.HOST}]

UserParameter=downdetector.status[*],/usr/bin/python3 /opt/downdetector-zabbix/downdetector_scraper.py --service $1 --flat --from-cache
