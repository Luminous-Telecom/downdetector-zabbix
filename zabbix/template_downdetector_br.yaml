zabbix_export:
  version: "7.0"
  template_groups:
    - uuid: 66e969935e754ea597de2f6cecd639e1
      name: downdetector
  templates:
    - uuid: 1145b1a0759f47c5a2fd53670e5eed4e
      template: downdetector
      name: downdetector
      description: |
        Um host Zabbix = um serviço (WhatsApp, Instagram, …).

        No host, defina a macro:
          {$DOWNDETECTOR.SLUG} = whatsapp

        Interface Agent = IP do servidor coletor (agent + FlareSolverr).

        Códigos: 1=ok, 2=warning, 3=danger, 0=unknown.
      groups:
        - name: downdetector
      macros:
        - macro: "{$DOWNDETECTOR.SLUG}"
          value: whatsapp
          description: "Slug na URL: downdetector.com.br/fora-do-ar/<slug>/"
      items:
        - uuid: 30bcc1266597496f92f208b987fc46eb
          name: "Downdetector: raw"
          type: ZABBIX_PASSIVE
          key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          delay: 15m
          history: 7d
          trends: "0"
          value_type: TEXT
          description: "JSON completo do serviço."
          tags:
            - tag: component
              value: raw
        - uuid: 2081e48e85774a10ac8a9d69c2619fab
          name: "Downdetector: status code"
          type: DEPENDENT
          key: downdetector.status.code
          delay: "0"
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          description: "1=ok 2=warning 3=danger 0=unknown"
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status_code
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: status
          triggers:
            - uuid: f1fe698a07f8457f8fbf8d0114faad16
              expression: "last(/downdetector/downdetector.status.code)=3"
              name: "Downdetector: {HOST.NAME} reporta problemas"
              priority: HIGH
            - uuid: 1aa5ef312230424181caa65dedd4ac5e
              expression: "last(/downdetector/downdetector.status.code)=2"
              name: "Downdetector: {HOST.NAME} reporta possíveis problemas"
              priority: WARNING
        - uuid: ada4ec9462d84e84aa31442c285fd459
          name: "Downdetector: status"
          type: DEPENDENT
          key: downdetector.status.text
          delay: "0"
          history: 90d
          trends: "0"
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: status
        - uuid: 059aa5f29ee543edbd9cbccdb62d0c7e
          name: "Downdetector: relatos"
          type: DEPENDENT
          key: downdetector.reports
          delay: "0"
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: reports
        - uuid: ea3d9df9b7f3433082ec9fdd2bd4b731
          name: "Downdetector: baseline"
          type: DEPENDENT
          key: downdetector.reports.baseline
          delay: "0"
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports_baseline
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: reports
        - uuid: b176e6e716bd4a0fbf1731776dbac8d6
          name: "Downdetector: nome"
          type: DEPENDENT
          key: downdetector.name
          delay: "0"
          history: 7d
          trends: "0"
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: meta
        - uuid: 5bb001791b6e49f8a84559ca2e2aac49
          name: "Downdetector: logo"
          type: DEPENDENT
          key: downdetector.logo
          delay: "0"
          history: 7d
          trends: "0"
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.logo
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: meta
