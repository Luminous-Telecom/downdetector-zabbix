zabbix_export:
  version: "7.0"
  template_groups:
    - uuid: 43cadd75fa48481aa11d0139b63b8e02
      name: downdetector
  templates:
    - uuid: 2b878aba6828435fabf8080789ecd43d
      template: downdetector
      name: downdetector
      groups:
        - name: downdetector
      description: "Um host Zabbix = um serviço do Downdetector.\n\nHost name (técnico) = slug da URL:\n  whatsapp → downdetector.com.br/fora-do-ar/whatsapp/\n\nVisible name pode ser \"WhatsApp\".\nInterface Agent = IP do coletor (FlareSolverr + script).\n\nCódigos: 1=ok, 2=warning, 3=danger, 0=unknown."
      items:
        - uuid: d93a572038bd45aa93a62a3de92da1d6
          name: "Downdetector: raw"
          type: ZABBIX_PASSIVE
          key: "downdetector.status[{HOST.HOST}]"
          delay: 10m
          history: 7d
          value_type: TEXT
          description: "JSON completo. Slug = Host name técnico."
          tags:
            - tag: component
              value: raw
        - uuid: 961de8b5df5c43049659f372a8f274f4
          name: "Downdetector: status code"
          type: DEPENDENT
          key: downdetector.status.code
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          description: "1=ok 2=warning 3=danger 0=unknown"
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status_code
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: status
          triggers:
            - uuid: 6e0551f655ff4406bcfa0e3be160ef42
              expression: "last(/downdetector/downdetector.status.code)=3"
              name: "Downdetector: {HOST.NAME} reporta problemas"
              priority: HIGH
            - uuid: ff443911b0fc44939b2bc25e8ece513d
              expression: "last(/downdetector/downdetector.status.code)=2"
              name: "Downdetector: {HOST.NAME} reporta possíveis problemas"
              priority: WARNING
        - uuid: f0d7120c5c654977914b33bc16a99012
          name: "Downdetector: status"
          type: DEPENDENT
          key: downdetector.status.text
          history: 90d
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: status
        - uuid: 3eee3b710b41471daede7e7f30484153
          name: "Downdetector: relatos"
          type: DEPENDENT
          key: downdetector.reports
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: reports
        - uuid: 70c64a37549c4583a1f2affd77b4dd91
          name: "Downdetector: baseline"
          type: DEPENDENT
          key: downdetector.reports.baseline
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports_baseline
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: reports
        - uuid: 9dbf476ae7c448109b05e6a235dbd09d
          name: "Downdetector: nome"
          type: DEPENDENT
          key: downdetector.name
          history: 7d
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: meta
        - uuid: ce821575b32f4692acc0ddb8894b72c2
          name: "Downdetector: logo"
          type: DEPENDENT
          key: downdetector.logo
          history: 7d
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.logo
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: meta
