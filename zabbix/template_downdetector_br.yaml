zabbix_export:
  version: "7.0"
  template_groups:
    - uuid: f3e43ff3fddb45f7b3b1ab531eb93933
      name: downdetector
  templates:
    - uuid: 531604a0bba14a92a3ac6615d70fb310
      template: downdetector
      name: downdetector
      groups:
        - name: downdetector
      description: |
        Um host Zabbix = um serviço Downdetector.

        Host name (técnico) = slug da URL:
          whatsapp → https://downdetector.com.br/fora-do-ar/whatsapp/

        Agent: downdetector.status[{HOST.HOST}] (lê cache local, ms).
        Interface Agent = IP do servidor coletor (FlareSolverr + script).

        Códigos: 1=ok, 2=warning, 3=danger, 0=unknown.
      items:
        - uuid: 6b41e1f297444be993e29dcdfc589853
          name: "Downdetector: raw"
          type: ZABBIX_PASSIVE
          key: "downdetector.status[{HOST.HOST}]"
          delay: 5m
          history: 7d
          value_type: TEXT
          description: "JSON do cache local (atualizado pelo timer)."
          tags:
            - tag: component
              value: raw
        - uuid: 28360498e00d4006a6b89a514026b07b
          name: "Downdetector: status code"
          type: DEPENDENT
          key: downdetector.status.code
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          description: "1=ok 2=warning 3=danger 0=unknown"
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status_code
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
          tags:
            - tag: component
              value: status
          triggers:
            - uuid: 2465ede9d8f5454a9b48edae20c95167
              expression: "last(/downdetector/downdetector.status.code)=3"
              name: "Downdetector: {HOST.NAME} reporta problemas"
              priority: HIGH
            - uuid: 87d51f51c8b74d43aee83fe6142fd67f
              expression: "last(/downdetector/downdetector.status.code)=2"
              name: "Downdetector: {HOST.NAME} reporta possíveis problemas"
              priority: WARNING
        - uuid: 0af37cf18d71411ebcc57b97edf28205
          name: "Downdetector: status"
          type: DEPENDENT
          key: downdetector.status.text
          history: 90d
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
        - uuid: 1bd6a3405c2445ed850c2f5d698e352c
          name: "Downdetector: relatos"
          type: DEPENDENT
          key: downdetector.reports
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
        - uuid: f4d4501e79984418915346fcc7d932e1
          name: "Downdetector: baseline"
          type: DEPENDENT
          key: downdetector.reports.baseline
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports_baseline
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
        - uuid: 07e9ea232c1f485984bf698b6fb4942c
          name: "Downdetector: nome"
          type: DEPENDENT
          key: downdetector.name
          history: 7d
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
        - uuid: 60ae56cbf0ff43cca290520a92aa465c
          name: "Downdetector: logo"
          type: DEPENDENT
          key: downdetector.logo
          history: 7d
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.logo
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{HOST.HOST}]"
