zabbix_export:
  version: "7.0"
  template_groups:
    - uuid: 43cadd75fa48481aa11d0139b63b8e02
      name: downdetector
  templates:
    - uuid: 2b878aba6828435fabf8080789ecd43d
      template: downdetector
      name: downdetector
      groups:
        - name: downdetector
      description: "Um host Zabbix = um serviço (WhatsApp, Instagram, …).\n\nNo host, defina a macro:\n  {$DOWNDETECTOR.SLUG} = whatsapp\n\nInterface Agent = IP do servidor coletor (agent + FlareSolverr).\n\nCódigos: 1=ok, 2=warning, 3=danger, 0=unknown."
      macros:
        - macro: "{$DOWNDETECTOR.SLUG}"
          value: whatsapp
          description: "Slug na URL: downdetector.com.br/fora-do-ar/<slug>/"
      items:
        - uuid: a11b22c33d44e55f66778899aabb0001
          name: "Downdetector: raw"
          type: ZABBIX_PASSIVE
          key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          delay: 15m
          history: 7d
          value_type: TEXT
          description: "JSON completo do serviço."
          tags:
            - tag: component
              value: raw
        - uuid: a11b22c33d44e55f66778899aabb0002
          name: "Downdetector: status code"
          type: DEPENDENT
          key: downdetector.status.code
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          description: "1=ok 2=warning 3=danger 0=unknown"
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status_code
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: status
          triggers:
            - uuid: a11b22c33d44e55f66778899aabb0008
              expression: "last(/downdetector/downdetector.status.code)=3"
              name: "Downdetector: {HOST.NAME} reporta problemas"
              priority: HIGH
            - uuid: a11b22c33d44e55f66778899aabb0009
              expression: "last(/downdetector/downdetector.status.code)=2"
              name: "Downdetector: {HOST.NAME} reporta possíveis problemas"
              priority: WARNING
        - uuid: a11b22c33d44e55f66778899aabb0003
          name: "Downdetector: status"
          type: DEPENDENT
          key: downdetector.status.text
          history: 90d
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: status
        - uuid: a11b22c33d44e55f66778899aabb0004
          name: "Downdetector: relatos"
          type: DEPENDENT
          key: downdetector.reports
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: reports
        - uuid: a11b22c33d44e55f66778899aabb0005
          name: "Downdetector: baseline"
          type: DEPENDENT
          key: downdetector.reports.baseline
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.reports_baseline
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: reports
        - uuid: a11b22c33d44e55f66778899aabb0006
          name: "Downdetector: nome"
          type: DEPENDENT
          key: downdetector.name
          history: 7d
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: meta
        - uuid: a11b22c33d44e55f66778899aabb0007
          name: "Downdetector: logo"
          type: DEPENDENT
          key: downdetector.logo
          history: 7d
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.logo
              error_handler: DISCARD_VALUE
          master_item:
            key: "downdetector.status[{$DOWNDETECTOR.SLUG}]"
          tags:
            - tag: component
              value: meta
